server {
    listen 80 default_server;
    listen [::]:80 default_server;

    server_name _;
    root /usr/share/nginx/html;

    error_page 404 /404.html;

    location / {
        return 404;
    }

    location = /404.html {
        internal;
    }
}

server {
    listen 80;
    listen [::]:80;

    root /usr/share/nginx/html/ogius.pl;
    index index.html index.htm;

    server_name ogius.pl www.ogius.pl;


    location / {
        try_files $uri $uri/ =404;
    }
}

