<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="stylesheet" type="text/css" href="main.css">
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/1.11.2/jquery.min.js"></script>
	<script src="script.js"></script>
	<title>kalkulator</title>
</head>
<body>
	<div class="buttons">
		<h1 id="text" class="text"></h1>
		<a href="">reset</a>
		<h2 onclick="pressNumber(1)">1</h2>
		<h2 onclick="pressNumber(2)">2</h2>
		<h2 onclick="pressNumber(3)">3</h2>
		<h2 onclick="action(1)">+</h2>
		<h2 onclick="pressNumber(4)">4</h2>
		<h2 onclick="pressNumber(5)">5</h2>
		<h2 onclick="pressNumber(6)">6</h2>
		<h2 onclick="action(2)">-</h2>
		<h2 onclick="pressNumber(7)">7</h2>
		<h2 onclick="pressNumber(8)">8</h2>
		<h2 onclick="pressNumber(9)">9</h2>
		<h2 onclick="action(3)">*</h2>
		<h2 onclick="pressNumber(0)">0</h2>
		<h2 onclick="action(4)">/</h2>
		<h2 onclick="action(5)">^</h2>
		<!-- <h2 class="a a6">√</h2> -->
		<h2 onclick="count(6)">=</h2>
	</div>
</body>
</html>
