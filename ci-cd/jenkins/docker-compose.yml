services:
  jenkins:
    build:
      context: .
      network: host
    container_name: jenkins_server
    network_mode: host
    restart: unless-stopped
    user: root
    volumes:
      - ./home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - /usr/bin/docker:/usr/bin/docker
      - ../../:/personal-prod-sites
