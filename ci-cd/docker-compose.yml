services:
  nginx:
    build:
      context: nginx
      network: host
    container_name: prod_nginx_server
    network_mode: host
    restart: unless-stopped

  grafana:
    build:
      context: grafana
      network: host
    container_name: prod_grafana_server
    environment:
      - GF_SERVER_HTTP_PORT=8079
    network_mode: host
    restart: unless-stopped
    volumes:
      - ${PWD}/grafana/data:/var/lib/grafana

  prometheus:
    image: prom/prometheus:latest
    container_name: prod_prometheus_server
    network_mode: host
    restart: unless-stopped
    volumes:
      - ${PWD}/prometheus/data:/prometheus
      - ${PWD}/prometheus/config/prometheus.yml:/etc/prometheus/prometheus.yml

  node-exporter:
    image: prom/node-exporter:latest
    container_name: prod_node_exporter
    network_mode: host
    restart: unless-stopped
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
