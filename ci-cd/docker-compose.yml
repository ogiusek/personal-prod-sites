services:
  nginx:
    build:
      context: nginx
      network: host
    container_name: prod_nginx_server
    network_mode: host
    restart: unless-stopped
  grafana:
    build:
      context: grafana
      network: host
    container_name: prod_grafana_server
    environment:
      - GF_SERVER_HTTP_PORT=8079
    network_mode: host
    restart: unless-stopped
    volumes:
      - ./grafana/data:/var/lib/grafana
  prometheus:
    build:
      context: prometheus
      network: host
    container_name: prod_prometheus_server
    network_mode: host
    restart: unless-stopped
    volumes:
      - ./prometheus/data:/prometheus
